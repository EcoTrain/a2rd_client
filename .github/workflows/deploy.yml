name: Deploy to Hosting

on:
  push:
    branches: [ deploy ]
  pull_request:
    branches: [ deploy ]

jobs:  
  deploy:
    name: Deploy to Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Pull on server
        uses: appleboy/ssh-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd a2rd_client
            git pull origin master
            sudo -S ${{ secrets.SSH_PASSWORD }} systemstl daemon-reload  
            sudo -S ${{ secrets.SSH_PASSWORD }} systemctl restart a2rd_client.service
